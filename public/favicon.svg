<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <!-- Background -->
  <rect width="32" height="32" fill="#000000"/>

  <!-- Cassette body -->
  <rect x="2" y="7" width="28" height="18" fill="#A2D5C6"/>
  <rect x="3" y="8" width="26" height="16" fill="#000000"/>
  <rect x="3" y="8" width="26" height="16" fill="none" stroke="#A2D5C6" stroke-width="0.75"/>

  <!-- Tape window -->
  <rect x="7" y="10" width="18" height="8" fill="#000000"/>

  <!-- Left reel -->
  <circle cx="12" cy="14" r="3" fill="#A2D5C6"/>
  <circle cx="12" cy="14" r="1.2" fill="#000000"/>

  <!-- Right reel -->
  <circle cx="20" cy="14" r="3" fill="#A2D5C6"/>
  <circle cx="20" cy="14" r="1.2" fill="#000000"/>

  <!-- Label -->
  <rect x="7" y="19" width="18" height="3" fill="#CFFFE2"/>

  <!-- Slice — thin plain black diagonal -->
  <line x1="5" y1="27" x2="27" y2="5" stroke="#000000" stroke-width="1.5" stroke-linecap="square"/>
</svg>
